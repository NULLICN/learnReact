name: CI/CD Pipeline

# ─────────────────────────────────────────────
# 触发条件：
#   - main   分支推送：仅运行 CI 代码校验
#   - deploy 分支推送：运行 CI 校验 → 构建 → 部署
# ─────────────────────────────────────────────
on:
  push:
    branches:
      - main

jobs:
  # ============================================================
  # Job 1: 构建 + 部署（仅 deploy 分支，且 CI 通过后才执行）
  # ============================================================
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest    

    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 Node.js 22 环境
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. 启用 pnpm（Corepack 是 Node.js 16.13+ 内置工具，用于管理包管理器版本）
      - name: Enable pnpm via Corepack
        run: corepack enable pnpm

      # 4. 安装项目依赖（不缓存，保证每次构建环境干净）
      - name: Install dependencies
        run: pnpm install

      # 5. 构建 React 项目
      #    对应 package.json 中的 "build": "tsc -b && vite build"
      #    先由 TypeScript 编译器做类型检查，再由 Vite 打包，产物输出到 dist/ 目录
      - name: Build project
        run: pnpm run build

      # 6. 将构建产物通过 SCP 上传到远端服务器
      #    使用 appleboy/scp-action 将本地 dist/ 目录推送至服务器指定路径
      - name: Upload dist to remote server
        uses: appleboy/scp-action@v0.1.7
        with:
          # 远端服务器 IP / 域名，从 GitHub Secrets 读取
          host: ${{ secrets.REMOTE_HOST }}
          # SSH 登录用户名，从 GitHub Secrets 读取
          username: ${{ secrets.REMOTE_USER }}
          # SSH 私钥（PEM 格式），从 GitHub Secrets 读取
          key: ${{ secrets.REMOTE_KEY }}
          # SSH 端口，默认 22，可在 Secrets 中自定义
          port: ${{ secrets.REMOTE_PORT || 22 }}
          # 本地待上传的目录（Vite 构建产物）
          source: "dist/*"
          # 远端目标目录，请替换为实际静态资源根目录
          target: ${{ secrets.REMOTE_DIR }}

      # 7. 通过 SSH 在远端服务器上执行部署后操作（如重载 Nginx）
      - name: Reload remote server service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.REMOTE_KEY }}
          port: ${{ secrets.REMOTE_PORT || 22 }}
          # 在远端服务器执行的命令：
          #   - 重载 Nginx 使新静态文件立即生效（无需完整重启，降低服务中断风险）
          #   请根据实际服务器环境修改此命令（如 pm2 / apache / caddy 等）
          script: |
            systemctl reload nginx
